name: Documentation
description: Something in docs or in-repo guidance is wrong, unclear, or missing.
title: "[Docs] "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for **documentation accuracy and discoverability** (README, website docs under `website/app/docs`, keybindings page, etc.).

  - type: textarea
    id: location
    attributes:
      label: Where is the issue?
      description: File path in this repo, or public URL if applicable.
      placeholder: e.g. website/app/docs/…
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
      description: Quote outdated text if helpful.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement (optional)
      description: Concrete wording or structure you would like to see.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Related issues, screenshots, or version of the docs you read.
