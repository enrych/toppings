name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Share what you want and why it matters. We prioritize requests that clearly describe user impact.

  - type: textarea
    id: problem
    attributes:
      label: Problem or gap
      description: What is hard, missing, or inconsistent today?
      placeholder: When I … I can't …
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: How you imagine this could work in the product. Sketches, mockups, or prior art welcome.
      placeholder: e.g. A toggle in … that …

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
      description: Other tools, workarounds, or designs you have already tried.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Optional — no obligation.
      options:
        - label: I am willing to open a PR for this (may need maintainer guidance)

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, related issues, or any other context that is relevant.
