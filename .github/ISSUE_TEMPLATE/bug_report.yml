name: Bug report
description: Something is broken or behaves incorrectly.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. The more specific you are, the faster we can triage.

        **Using AI or automation to draft this?** That is fine — please still verify reproduction steps yourself and fill in version / environment accurately.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing what goes wrong.
      placeholder: e.g. Playlist runtime freezes when…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps someone else can follow from a clean state (after install / refresh as relevant).
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened, including any error text if visible.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Toppings version
      description: Extension version from the store listing or the in-extension UI, if you can find it.
      placeholder: e.g. 3.0.3

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Edge
        - Safari
        - Other / not sure
    validations:
      required: true

  - type: input
    id: browser_version
    attributes:
      label: Browser version (optional)
      placeholder: e.g. 136.0.7103.93

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, screen recording, console errors (extension/service worker), or anything else that helps.
      placeholder: Attach images by dragging them into this field, or paste logs here.
