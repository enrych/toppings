name: Deploy Website

on:
  push:
    branches: ["main"]
    paths:
      - "website/**"
      - "packages/**"
  workflow_dispatch:

concurrency:
  group: "cf-pages-website"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: cd website && bun install

      - name: Build (static export → website/out)
        run: cd website && bun run build

      # Deploys the static export to Cloudflare Pages.
      # Required repo secrets:
      #   CLOUDFLARE_API_TOKEN   — token with "Cloudflare Pages: Edit"
      #   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
      # The --project-name MUST match the Pages project bound to
      # toppings.enry.ch in the Cloudflare dashboard.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy website/out
            --project-name=toppings-website
            --branch=main
